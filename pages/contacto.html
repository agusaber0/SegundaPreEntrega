    <header>
        <nav class="navbar navbar-expand-lg fixed-top bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="../index.html">
                    <h1>Bien Sur</h1>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="../index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="nosotros.html">Nosotros</a>
                        </li>
                        <li class="nav-item">

                        </li>
                        <li class="nav-item">

                            <a class="nav-link" href="contacto.html">Contacto</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

    </header>



    <main>

        <section class="contactt">
            <article class="contactt-content">
                <h2 class="extra">Contacto</h2>
            </article>
        </section>


        <section class="form-grid">
            <article class="form-data">
                <div>
                    <h2>¿Queres organizar tu <br> evento con nosotros?</h2><br>
                    <p>Dejanos tu mensaje o comunicate <br> al <b>(+598)123123123</b></p>
                </div>
                <div>
                    <h2>Email</h2>
                    <p>biensur@biensur.com</p>
                </div>
                <div>
                    <h2>Dirección</h2>
                    <p>Ruta fantasia km. 22,2</p>
                </div>

            </article>
            <form action="">
                <label for="name"></label>
                <input type="text" placeholder="Nombre" name="nombre">
                <label for="email"></label>
                <input type="email" placeholder="Correo Electrónico" name="email">
                <label for="text"></label>
                <textarea name="message" id="" cols="30" rows="7" placeholder="Mensaje" name="text"></textarea>
                <input type="submit" value="Enviar">
            </form>

            <iframe
                src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d48384.01540661258!2d14.6070828!3d40.7179953!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x86cd434d7b9c626d%3A0xc06f0b7f12886796!2sBIENSUR!5e0!3m2!1sen!2suy!4v1706734794368!5m2!1sen!2suy"
                allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

        </section>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
            crossorigin="anonymous"></script>
    </main>

    <footer id="footer">

        <p>© 2024 Bien Sur</p>

        <section class="footer-img">

                        alt="boton de facebook" class="boton-fb">
